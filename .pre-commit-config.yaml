# Pre-commit hooks for code quality
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # ============================================================================
  # Python Code Formatting
  # ============================================================================
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        name: Format Python code with black
        language_version: python3.11
        args: [--line-length=100]
        exclude: ^(tools/installer/specs/|\.venv/|venv/)

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort Python imports with isort
        args: [--profile=black, --line-length=100]
        exclude: ^(tools/installer/specs/|\.venv/|venv/)

  # ============================================================================
  # Python Linting
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.15
    hooks:
      - id: ruff
        name: Lint Python code with ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^(tools/installer/specs/|\.venv/|venv/)

  # ============================================================================
  # General File Checks
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        exclude: ^(\.pytest_cache/|\.mypy_cache/|\.ruff_cache/)
      
      - id: end-of-file-fixer
        name: Fix end of files
        exclude: ^(\.pytest_cache/|\.mypy_cache/|\.ruff_cache/)
      
      - id: check-yaml
        name: Check YAML syntax
        exclude: ^(\.github/workflows/|docker/)
      
      - id: check-json
        name: Check JSON syntax
      
      - id: check-toml
        name: Check TOML syntax
      
      - id: check-added-large-files
        name: Check for large files
        args: [--maxkb=1000]
      
      - id: check-merge-conflict
        name: Check for merge conflicts
      
      - id: check-case-conflict
        name: Check for case conflicts
      
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: [--fix=lf]

  # ============================================================================
  # Python Security & Quality
  # ============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: Security check with bandit
        args: [-c, pyproject.toml, -r, droneresearch/, tools/]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^(tests/|examples/)

  # ============================================================================
  # Documentation
  # ============================================================================
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        name: Check docstring style
        args: [--convention=google]
        exclude: ^(tests/|examples/|tools/installer/)
        additional_dependencies: [toml]

  # ============================================================================
  # Type Checking (Optional - can be slow)
  # ============================================================================
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       name: Type check with mypy
  #       args: [--ignore-missing-imports, --no-strict-optional]
  #       additional_dependencies: [types-all]
  #       exclude: ^(tests/|examples/)

  # ============================================================================
  # Commit Message Validation
  # ============================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        name: Check commit message format
        stages: [commit-msg]

# ============================================================================
# Configuration
# ============================================================================
default_language_version:
  python: python3.11

# Fail fast on first error
fail_fast: false

# Exclude patterns
exclude: |
  (?x)^(
    \.git/|
    \.pytest_cache/|
    \.mypy_cache/|
    \.ruff_cache/|
    __pycache__/|
    \.venv/|
    venv/|
    env/|
    build/|
    dist/|
    \.egg-info/|
    htmlcov/|
    \.coverage|
    coverage\.xml|
    junit\.xml|
    tools/installer/specs/|
    tools/ui/qml/assets/
  )

# Minimum pre-commit version
minimum_pre_commit_version: 3.0.0

