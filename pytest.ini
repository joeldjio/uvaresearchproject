[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use fake connections)
    system: System tests (require SITL or real hardware)
    e2e: End-to-end tests (require full UI stack)
    slow: Slow tests (>1s runtime)
    sitl: Tests requiring ArduPilot SITL
    px4: Tests requiring PX4 SITL
    ros2: Tests requiring ROS2
    hardware: Tests requiring real hardware
    ui: UI/Qt tests
    skip_ci: Skip in CI environment

# Output options
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short
    --disable-warnings

# Coverage options
[coverage:run]
source = droneresearch,tools.ui
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */dist-packages/*
    */venv/*
    */env/*
    */.venv/*
    */examples/*
    */tools/installer/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    if sys.platform

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml
