name: Build uavresearch gcs

on:
  push:
    branches:
      - main
      - ui-dashboard
      - "fix/**"
      - "feature/**"
    tags: ["v*"]
  pull_request:
    branches:
      - main
      - ui-dashboard
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
          - name: linux-jammy
            os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/installer/requirements_build.txt
          python -m pip install . requests

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Generate installer assets
        if: runner.os != 'Linux'
        run: python tools/installer/icon/make_assets.py

      - name: Build uavresearch gcs bundle
        if: runner.os != 'Linux'
        run: pyinstaller tools/installer/specs/uavresearch_gcs.spec --noconfirm --clean

      - name: Build Jammy Debian package
        if: runner.os == 'Linux'
        run: |
          chmod +x tools/installer/build_linux_deb.sh
          tools/installer/build_linux_deb.sh

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' /Q tools\installer\inno\uavresearch_gcs.iss

      - name: Package bundle on macOS
        if: runner.os == 'macOS'
        run: |
          tar -czf "uavresearch-gcs-macos.tar.gz" -C dist UAVResearchGCS

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: uavresearch-gcs-windows
          path: tools/installer/out/uavresearch-gcs-setup-*.exe

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: uavresearch-gcs-macos
          path: uavresearch-gcs-macos.tar.gz

      - name: Upload Jammy Debian artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: uavresearch-gcs-linux-jammy
          path: tools/installer/out/*.deb
