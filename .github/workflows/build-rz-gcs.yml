name: Build RZ GCS

on:
  push:
    branches: [main, ui-dashboard]
    tags: ['v*']
  pull_request:
    branches: [main, ui-dashboard]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller PyQt6 PyQt6-WebEngine pyqtgraph requests

      - name: Build RZ GCS bundle
        run: pyinstaller tools/installer/specs/rz_gcs.spec --noconfirm --clean

      - name: Package bundle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/RZGCS -DestinationPath RZ-GCS-windows.zip -Force

      - name: Package bundle on macOS/Linux
        if: runner.os != 'Windows'
        run: |
          tar -czf "RZ-GCS-${{ runner.os }}.tar.gz" -C dist RZGCS

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: RZ-GCS-windows
          path: RZ-GCS-windows.zip

      - name: Upload macOS/Linux artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: RZ-GCS-${{ runner.os }}
          path: RZ-GCS-${{ runner.os }}.tar.gz
